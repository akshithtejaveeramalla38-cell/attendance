services:
  - type: web
    name: ai-attendance-server
    env: java
    buildCommand: cd server && chmod +x ./mvnw && ./mvnw clean install -DskipTests
    startCommand: cd server && java -jar target/ai-attendance-system-0.0.1-SNAPSHOT.jar

  - type: web
    name: ai-attendance-client
    env: static
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
